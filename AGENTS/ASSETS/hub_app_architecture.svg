<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">
    CareVL Hub App Architecture (Analytics Pipeline)
  </text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">
    Planned: Streamlit operator GUI (ADR 29) — same Python core as Typer CLI
  </text>
  
  <!-- User Layer -->
  <rect x="50" y="58" width="800" height="70" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="5"/>
  <text x="450" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">
    User Layer
  </text>
  <rect x="150" y="93" width="150" height="30" fill="#8b5cf6" rx="5"/>
  <text x="225" y="113" text-anchor="middle" fill="white" font-size="12">Admin Hub</text>
  <rect x="320" y="93" width="150" height="30" fill="#7c3aed" rx="5"/>
  <text x="395" y="108" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Hub GUI</text>
  <text x="395" y="120" text-anchor="middle" fill="white" font-size="9">Streamlit (ADR 29)</text>
  <rect x="490" y="93" width="150" height="30" fill="#8b5cf6" rx="5"/>
  <text x="565" y="113" text-anchor="middle" fill="white" font-size="12">Data Analyst</text>
  <rect x="660" y="93" width="150" height="30" fill="#8b5cf6" rx="5"/>
  <text x="735" y="113" text-anchor="middle" fill="white" font-size="12">Automation</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="128" x2="450" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- CLI Layer -->
  <rect x="50" y="160" width="800" height="90" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="2" rx="5"/>
  <text x="450" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">
    Operator layer: Typer CLI + planned Streamlit entry
  </text>
  <rect x="80" y="200" width="140" height="40" fill="#a78bfa" rx="5"/>
  <text x="150" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="bold">carevl-hub init</text>
  <text x="150" y="230" text-anchor="middle" fill="white" font-size="9">Setup config</text>
  
  <rect x="240" y="200" width="140" height="40" fill="#a78bfa" rx="5"/>
  <text x="310" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="bold">carevl-hub download</text>
  <text x="310" y="230" text-anchor="middle" fill="white" font-size="9">Fetch snapshots</text>
  
  <rect x="400" y="200" width="140" height="40" fill="#a78bfa" rx="5"/>
  <text x="470" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="bold">carevl-hub aggregate</text>
  <text x="470" y="230" text-anchor="middle" fill="white" font-size="9">Process data</text>
  
  <rect x="560" y="200" width="140" height="40" fill="#a78bfa" rx="5"/>
  <text x="630" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="bold">carevl-hub report</text>
  <text x="630" y="230" text-anchor="middle" fill="white" font-size="9">Generate output</text>
  
  <rect x="720" y="200" width="110" height="40" fill="#a78bfa" rx="5"/>
  <text x="775" y="213" text-anchor="middle" fill="white" font-size="10" font-weight="bold">gui</text>
  <text x="775" y="228" text-anchor="middle" fill="white" font-size="9">Streamlit</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="250" x2="450" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Data Pipeline -->
  <rect x="50" y="280" width="800" height="180" fill="#dcfce7" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="450" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">
    Data Pipeline
  </text>
  
  <!-- Step 1: Download -->
  <rect x="70" y="320" width="160" height="120" fill="#34d399" rx="5"/>
  <text x="150" y="340" text-anchor="middle" fill="white" font-size="11" font-weight="bold">1. GitHub Downloader</text>
  <text x="150" y="360" text-anchor="middle" fill="white" font-size="9">• Org-level PAT</text>
  <text x="150" y="375" text-anchor="middle" fill="white" font-size="9">• List all repos</text>
  <text x="150" y="390" text-anchor="middle" fill="white" font-size="9">• Download releases</text>
  <text x="150" y="405" text-anchor="middle" fill="white" font-size="9">• 100 stations</text>
  <text x="150" y="420" text-anchor="middle" fill="white" font-size="9">• Parallel fetch</text>
  
  <!-- Arrow -->
  <line x1="230" y1="380" x2="260" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Decrypt -->
  <rect x="260" y="320" width="160" height="120" fill="#34d399" rx="5"/>
  <text x="340" y="340" text-anchor="middle" fill="white" font-size="11" font-weight="bold">2. Crypto Service</text>
  <text x="340" y="360" text-anchor="middle" fill="white" font-size="9">• AES-256 decrypt</text>
  <text x="340" y="375" text-anchor="middle" fill="white" font-size="9">• Master key</text>
  <text x="340" y="390" text-anchor="middle" fill="white" font-size="9">• Verify integrity</text>
  <text x="340" y="405" text-anchor="middle" fill="white" font-size="9">• Extract SQLite</text>
  <text x="340" y="420" text-anchor="middle" fill="white" font-size="9">• Batch process</text>
  
  <!-- Arrow -->
  <line x1="420" y1="380" x2="450" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Aggregate -->
  <rect x="450" y="320" width="160" height="120" fill="#34d399" rx="5"/>
  <text x="530" y="340" text-anchor="middle" fill="white" font-size="11" font-weight="bold">3. DuckDB Aggregator</text>
  <text x="530" y="360" text-anchor="middle" fill="white" font-size="9">• Load all SQLite</text>
  <text x="530" y="375" text-anchor="middle" fill="white" font-size="9">• JOIN queries</text>
  <text x="530" y="390" text-anchor="middle" fill="white" font-size="9">• Aggregate stats</text>
  <text x="530" y="405" text-anchor="middle" fill="white" font-size="9">• Data quality</text>
  <text x="530" y="420" text-anchor="middle" fill="white" font-size="9">• Export Parquet</text>
  
  <!-- Arrow -->
  <line x1="610" y1="380" x2="640" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Report -->
  <rect x="640" y="320" width="160" height="120" fill="#34d399" rx="5"/>
  <text x="720" y="340" text-anchor="middle" fill="white" font-size="11" font-weight="bold">4. Report Generator</text>
  <text x="720" y="360" text-anchor="middle" fill="white" font-size="9">• Excel export</text>
  <text x="720" y="375" text-anchor="middle" fill="white" font-size="9">• PDF reports</text>
  <text x="720" y="390" text-anchor="middle" fill="white" font-size="9">• Charts/graphs</text>
  <text x="720" y="405" text-anchor="middle" fill="white" font-size="9">• Audit logs</text>
  <text x="720" y="420" text-anchor="middle" fill="white" font-size="9">• Email delivery</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="460" x2="450" y2="490" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Analytics Layer -->
  <rect x="50" y="490" width="800" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="450" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">
    Analytics &amp; Visualization Layer
  </text>
  
  <rect x="100" y="530" width="180" height="45" fill="#fbbf24" rx="5"/>
  <text x="190" y="548" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Jupyter Notebooks</text>
  <text x="190" y="563" text-anchor="middle" fill="white" font-size="9">Ad-hoc analysis, Python</text>
  
  <rect x="310" y="530" width="180" height="45" fill="#fbbf24" rx="5"/>
  <text x="400" y="548" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Streamlit Dashboard</text>
  <text x="400" y="563" text-anchor="middle" fill="white" font-size="9">Interactive web UI</text>
  
  <rect x="520" y="530" width="180" height="45" fill="#fbbf24" rx="5"/>
  <text x="610" y="548" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Pandas/Polars</text>
  <text x="610" y="563" text-anchor="middle" fill="white" font-size="9">Data manipulation</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="590" x2="450" y2="620" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Output Layer -->
  <rect x="50" y="620" width="800" height="60" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" rx="5"/>
  <text x="450" y="645" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">
    Output
  </text>
  <text x="200" y="665" text-anchor="middle" fill="#4f46e5" font-size="11">📊 Excel Reports</text>
  <text x="350" y="665" text-anchor="middle" fill="#4f46e5" font-size="11">📄 PDF Documents</text>
  <text x="500" y="665" text-anchor="middle" fill="#4f46e5" font-size="11">💾 Parquet Files</text>
  <text x="650" y="665" text-anchor="middle" fill="#4f46e5" font-size="11">📧 Email Alerts</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
</svg>
