<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">
    CareVL Hub App - Analytics Pipeline
  </text>

  <!-- GitHub (Data Source) -->
  <g id="github-source">
    <rect x="50" y="70" width="900" height="100" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8"/>
    <text x="70" y="95" font-size="14" font-weight="bold" fill="#475569">GitHub (Data Source)</text>
    
    <rect x="70" y="110" width="150" height="40" fill="#3b82f6" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="145" y="135" text-anchor="middle" fill="white" font-size="11">station-001/releases</text>
    
    <rect x="240" y="110" width="150" height="40" fill="#3b82f6" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="315" y="135" text-anchor="middle" fill="white" font-size="11">station-002/releases</text>
    
    <text x="410" y="135" font-size="14" fill="#64748b">...</text>
    
    <rect x="460" y="110" width="150" height="40" fill="#3b82f6" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="535" y="135" text-anchor="middle" fill="white" font-size="11">station-100/releases</text>
    
    <rect x="700" y="110" width="230" height="40" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="815" y="130" text-anchor="middle" fill="white" font-size="10">Encrypted snapshots:</text>
    <text x="815" y="145" text-anchor="middle" fill="white" font-size="9">FINAL_001_2026-04-28.db.enc</text>
  </g>

  <!-- Arrow down -->
  <line x1="500" y1="170" x2="500" y2="210" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="520" y="195" font-size="11" fill="#475569">Download (GitHub API)</text>

  <!-- Hub CLI Commands -->
  <g id="hub-cli">
    <rect x="50" y="210" width="900" height="320" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" rx="8"/>
    <text x="70" y="235" font-size="14" font-weight="bold" fill="#6b21a8">CareVL Hub CLI</text>
    
    <!-- Step 1: Download -->
    <rect x="70" y="250" width="200" height="60" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="170" y="270" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1. Download</text>
    <text x="170" y="290" text-anchor="middle" fill="white" font-size="10">carevl-hub download</text>
    <text x="170" y="303" text-anchor="middle" fill="white" font-size="9">→ snapshots/*.db.enc</text>
    
    <!-- Arrow -->
    <line x1="270" y1="280" x2="310" y2="280" stroke="#6b21a8" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 2: Decrypt -->
    <rect x="310" y="250" width="200" height="60" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="410" y="270" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2. Decrypt</text>
    <text x="410" y="290" text-anchor="middle" fill="white" font-size="10">carevl-hub decrypt</text>
    <text x="410" y="303" text-anchor="middle" fill="white" font-size="9">→ decrypted/*.db</text>
    
    <!-- Arrow -->
    <line x1="510" y1="280" x2="550" y2="280" stroke="#6b21a8" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 3: Aggregate -->
    <rect x="550" y="250" width="200" height="60" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="650" y="270" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3. Aggregate</text>
    <text x="650" y="290" text-anchor="middle" fill="white" font-size="10">carevl-hub aggregate</text>
    <text x="650" y="303" text-anchor="middle" fill="white" font-size="9">DuckDB queries</text>
    
    <!-- Arrow down -->
    <line x1="410" y1="310" x2="410" y2="340" stroke="#6b21a8" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- DuckDB Engine -->
    <rect x="280" y="340" width="260" height="80" fill="#10b981" stroke="#059669" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="410" y="365" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DuckDB Engine</text>
    <text x="410" y="385" text-anchor="middle" fill="white" font-size="11">SELECT * FROM sqlite_scan(...)</text>
    <text x="410" y="400" text-anchor="middle" fill="white" font-size="11">UNION ALL ...</text>
    <text x="410" y="415" text-anchor="middle" fill="white" font-size="11">GROUP BY site_id</text>
    
    <!-- Arrow down -->
    <line x1="410" y1="420" x2="410" y2="450" stroke="#6b21a8" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 4: Report -->
    <rect x="310" y="450" width="200" height="60" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="410" y="470" text-anchor="middle" fill="white" font-size="12" font-weight="bold">4. Generate Report</text>
    <text x="410" y="490" text-anchor="middle" fill="white" font-size="10">carevl-hub report</text>
    <text x="410" y="503" text-anchor="middle" fill="white" font-size="9">Excel / Parquet / CSV</text>
  </g>

  <!-- Arrow down -->
  <line x1="500" y1="530" x2="500" y2="560" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <g id="output">
    <rect x="200" y="560" width="600" height="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" rx="5"/>
    <text x="500" y="580" text-anchor="middle" fill="white" font-size="12" font-weight="bold">
      📊 Báo cáo tổng hợp: monthly_report.xlsx, hub_data.parquet
    </text>
  </g>

  <!-- Side: Optional Dashboard -->
  <g id="dashboard">
    <rect x="780" y="340" width="180" height="170" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="870" y="365" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">Optional:</text>
    <text x="870" y="385" text-anchor="middle" fill="#1e40af" font-size="11">Web Dashboard</text>
    
    <rect x="800" y="400" width="140" height="30" fill="#3b82f6" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="870" y="420" text-anchor="middle" fill="white" font-size="10">Streamlit / Dash</text>
    
    <rect x="800" y="445" width="140" height="30" fill="#3b82f6" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="870" y="465" text-anchor="middle" fill="white" font-size="10">Jupyter Notebook</text>
    
    <rect x="800" y="490" width="140" height="30" fill="#3b82f6" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="870" y="510" text-anchor="middle" fill="white" font-size="10">Power BI / Tableau</text>
  </g>
  
  <!-- Arrow to dashboard -->
  <path d="M 540 380 L 780 380" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)" fill="none"/>
  <text x="640" y="370" font-size="10" fill="#475569">Export data</text>
</svg>