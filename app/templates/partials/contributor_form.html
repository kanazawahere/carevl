<div>
    {% if encounter %}
    <div class="border-l-4 border-green-500 pl-4 mb-6">
        <h3 class="text-lg font-medium text-gray-900">Bệnh nhân: {{ encounter.patient_id }}</h3>
        <p class="text-sm text-gray-500">Mã Sticker: <span class="font-bold">{{ encounter.sticker_id }}</span></p>
        <p class="text-xs text-gray-400 font-mono">UUID: {{ encounter.uuid }}</p>
    </div>

    <!-- Dummy medical form -->
    <form hx-post="/contributor/submit/{{ encounter.uuid }}"
          hx-target="#form-container"
          hx-swap="innerHTML"
          class="space-y-4">

        <div>
            <label for="blood_pressure" class="block text-sm font-medium text-gray-700">Huyết áp (mmHg)</label>
            <input type="text" id="blood_pressure" name="blood_pressure" placeholder="120/80"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm p-2 border">
        </div>

        <div>
            <label for="heart_rate" class="block text-sm font-medium text-gray-700">Nhịp tim (lần/phút)</label>
            <input type="number" id="heart_rate" name="heart_rate" placeholder="75"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm p-2 border">
        </div>

        <div>
            <label for="notes" class="block text-sm font-medium text-gray-700">Ghi chú lâm sàng</label>
            <textarea id="notes" name="notes" rows="3"
                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm p-2 border"></textarea>
        </div>

        <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
            Lưu Kết Quả Khám
        </button>
    </form>

    {% else %}
    <div class="text-center py-8">
        <svg class="mx-auto h-12 w-12 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <h3 class="mt-2 text-sm font-medium text-gray-900">Không tìm thấy mã Sticker</h3>
        <p class="mt-1 text-sm text-gray-500">Mã: <span class="font-bold">{{ sticker_id }}</span> không tồn tại trong hệ thống hàng chờ. Vui lòng thử lại.</p>
    </div>
    {% endif %}
</div>
