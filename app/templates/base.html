<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CareVL{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>

    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1d4ed8',
                        secondary: '#475569',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">
    <nav class="bg-primary text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/operator" class="flex-shrink-0 flex items-center font-bold text-xl">
                        CareVL
                    </a>
                    <div class="hidden md:ml-6 md:flex md:space-x-8">
                        <a href="/operator" class="text-gray-100 hover:text-white hover:border-white inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium">
                            Operator (Site)
                        </a>
                        <a href="/contributor" class="text-gray-100 hover:text-white hover:border-white inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium">
                            Contributor (Trạm)
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile menu -->
        <div class="md:hidden flex space-x-4 px-4 pb-2">
            <a href="/operator" class="text-gray-100 block px-3 py-2 rounded-md text-base font-medium">Operator</a>
            <a href="/contributor" class="text-gray-100 block px-3 py-2 rounded-md text-base font-medium">Contributor</a>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-center">
            <p class="text-sm text-gray-500">© 2026 Care Vinh Long. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
